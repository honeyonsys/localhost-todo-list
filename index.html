<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Harish Kumar">
    <meta name="description" content="Professional task management with project sections.">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 2rem;
        }

        /* Header & Navigation */
        .header {
            background: var(--bg-card);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before {
            content: "✓";
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn-add-project {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .btn-add-project:hover {
            background: #eef2ff;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Project Sections */
        .project-card {
            background: var(--bg-card);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .project-header {
            padding: 1.25rem 1.5rem;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .project-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .project-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: #fef2f2; }

        /* Task List */
        .task-list {
            padding: 0.5rem 0;
        }

        .task-item {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: #f8fafc; }

        .task-checkbox {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .task-content {
            flex-grow: 1;
            font-size: 0.9375rem;
        }

        .task-meta {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .task-item.complete .task-content {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .btn-delete-task {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.25rem;
            line-height: 1;
            border-radius: 0.25rem;
        }

        .btn-delete-task:hover {
            color: var(--danger);
            background: #fee2e2;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal {
            background: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease-out;
            padding: 1.5rem;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .btn-close {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid #c7d2fe;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>TodoPro</h1>
        <a href="#" class="btn-add-project" onclick="showProjectModal(event)">
            <span>+</span> Add Project
        </a>
    </header>

    <div class="container" id="projectContainer">
        <!-- Projects will be injected here -->
    </div>

    <!-- Add Project Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <div class="modal-header">
                <h3>New Project</h3>
                <button class="btn-close" onclick="hideModals()">&times;</button>
            </div>
            <div class="form-group">
                <input type="text" id="projectInput" class="form-input" placeholder="Enter project name..." onkeypress="handleProjectKeyPress(event)">
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="addProject()">Create Project</button>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="taskModalTitle">Add Tasks</h3>
                <button class="btn-close" onclick="hideModals()">&times;</button>
            </div>
            <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;">Add multiple tasks by pressing Enter.</p>
            <div class="form-group">
                <input type="text" id="taskInput" class="form-input" placeholder="What needs to be done?" onkeypress="handleTaskKeyPress(event)">
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-primary" style="flex: 2; justify-content: center;" onclick="addTask()">Add Task</button>
                <button class="btn" style="flex: 1; justify-content: center; background: #f1f5f9;" onclick="hideModals()">Done</button>
            </div>
        </div>
    </div>

    <script>
        let currentProjectId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchProjects();
        });

        function fetchProjects() {
            const container = document.getElementById('projectContainer');
            const data = localStorage.getItem('honeyonsys-tasks');
            const projects = data ? JSON.parse(data) : [];

            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-state-icon">📋</span>
                        <p>No projects yet. Click "Add Project" to get started.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="project-card" data-id="${project.id}">
                    <div class="project-header">
                        <span class="project-title">${project.id}</span>
                        <div class="project-actions">
                            <button class="btn btn-primary" onclick="showTaskModal('${project.id}')">
                                <span>+</span> Add Task
                            </button>
                            <button class="btn btn-danger" onclick="deleteProject('${project.id}')">
                                <span>×</span> Delete Project
                            </button>
                        </div>
                    </div>
                    <div class="task-list">
                        ${project.tasks.length > 0 
                            ? project.tasks.map(task => `
                                <div class="task-item ${task.status === 'complete' ? 'complete' : ''}">
                                    <input type="checkbox" class="task-checkbox" 
                                        ${task.status === 'complete' ? 'checked' : ''} 
                                        onchange="toggleTaskStatus('${project.id}', '${task.id}', this.checked)">
                                    <div class="task-content">
                                        ${task.task}
                                        <span class="task-meta">Added: ${formatDate(task.id)}</span>
                                    </div>
                                    <button class="btn-delete-task" onclick="deleteTask('${project.id}', '${task.id}')" title="Delete Task">&times;</button>
                                </div>
                            `).join('')
                            : '<div style="padding: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.875rem;">No tasks yet.</div>'
                        }
                    </div>
                </div>
            `).join('');
        }

        // Project Operations
        function addProject() {
            const input = document.getElementById('projectInput');
            const name = input.value.trim();
            if (!name) return alert('Please enter a project name.');

            const data = localStorage.getItem('honeyonsys-tasks');
            const projects = data ? JSON.parse(data) : [];
            
            if (projects.find(p => p.id === name)) return alert('Project already exists.');

            projects.push({ id: name, tasks: [] });
            localStorage.setItem('honeyonsys-tasks', JSON.stringify(projects));
            
            input.value = '';
            hideModals();
            fetchProjects();
        }

        function deleteProject(projectId) {
            if (!confirm(`Are you sure you want to delete "${projectId}" and all its tasks?`)) return;

            const projects = JSON.parse(localStorage.getItem('honeyonsys-tasks'));
            const filtered = projects.filter(p => p.id !== projectId);
            localStorage.setItem('honeyonsys-tasks', JSON.stringify(filtered));
            fetchProjects();
        }

        // Task Operations
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (!taskText) return;

            const projects = JSON.parse(localStorage.getItem('honeyonsys-tasks'));
            const project = projects.find(p => p.id === currentProjectId);
            
            if (project) {
                project.tasks.push({
                    id: Date.now(),
                    task: taskText,
                    status: 'pending'
                });
                localStorage.setItem('honeyonsys-tasks', JSON.stringify(projects));
                input.value = '';
                input.focus();
                fetchProjects();
            }
        }

        function toggleTaskStatus(projectId, taskId, isComplete) {
            const projects = JSON.parse(localStorage.getItem('honeyonsys-tasks'));
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const task = project.tasks.find(t => t.id == taskId);
                if (task) {
                    task.status = isComplete ? 'complete' : 'pending';
                    localStorage.setItem('honeyonsys-tasks', JSON.stringify(projects));
                    fetchProjects();
                }
            }
        }

        function deleteTask(projectId, taskId) {
            if (!confirm('Remove this task?')) return;

            const projects = JSON.parse(localStorage.getItem('honeyonsys-tasks'));
            const project = projects.find(p => p.id === projectId);
            if (project) {
                project.tasks = project.tasks.filter(t => t.id != taskId);
                localStorage.setItem('honeyonsys-tasks', JSON.stringify(projects));
                fetchProjects();
            }
        }

        // UI Helpers
        function showProjectModal(e) {
            e.preventDefault();
            document.getElementById('projectModal').style.display = 'flex';
            document.getElementById('projectInput').focus();
        }

        function showTaskModal(projectId) {
            currentProjectId = projectId;
            document.getElementById('taskModalTitle').innerText = `Tasks for ${projectId}`;
            document.getElementById('taskModal').style.display = 'flex';
            document.getElementById('taskInput').focus();
        }

        function hideModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            currentProjectId = null;
        }

        function handleProjectKeyPress(e) {
            if (e.key === 'Enter') addProject();
        }

        function handleTaskKeyPress(e) {
            if (e.key === 'Enter') addTask();
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-GB', { 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Close modal on click outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                hideModals();
            }
        }
    </script>
</body>
</html>
